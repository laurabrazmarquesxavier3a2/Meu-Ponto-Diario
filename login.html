<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login - RH</title>
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Fonte -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
   body {
     font-family: 'Poppins', sans-serif;
     height: 100vh;
     margin: 0;
   }
   .login-container {
     height: 100vh;
   }
   .left-side {
     background: linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.6)),
                 url('https://images.unsplash.com/photo-1521791136064-7986c2920216') no-repeat center center;
     background-size: cover;
     color: white;
     display: flex;
     align-items: center;
     justify-content: center;
   }
   .login-box {
     max-width: 350px;
     width: 100%;
   }
   .login-title {
     font-size: 2rem;
     font-weight: 600;
     margin-bottom: 30px;
   }
   .form-control {
     background-color: #e5e5e5;
     border: none;
     margin-bottom: 15px;
     height: 45px;
   }
   .btn-login {
     background-color: #1c2f5c;
     color: white;
     border-radius: 30px;
     padding: 10px;
     width: 100%;
     font-weight: 500;
   }
   .btn-login:hover {
     background-color: #162447;
   }
   .forgot {
     font-size: 0.85rem;
     color: #ccc;
     margin-top: 10px;
     display: block;
   }
   .right-side {
     background: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d') no-repeat center center;
     background-size: cover;
   }
   /* Responsividade */
   @media (max-width: 768px) {
     .right-side {
       display: none;
     }
   }
</style>
</head>
<body>
<div class="container-fluid login-container">
<!-- Lado esquerdo -->
<div>
<div class="login-box">
<div class="login-title">
         Gestão de RH rápida <br> e segura.
</div>
<form>
<input type="text" class="form-control" placeholder="Usuário">
<input type="password" class="form-control" placeholder="Senha">
<button type="submit" class="btn btn-login">Entrar</button>
<a href="#" class="forgot">Esqueci minha senha.</a>
</form>
</div>
</div>


</div>
</body>
</html>
